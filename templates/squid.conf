# CODE SHIELD V3 -- Squid Outbound Proxy Configuration
# Whitelist-only proxy for OpenClaw AI Agent

# Basic settings
http_port 3128
visible_hostname codeshield-proxy

# Access control
acl localnet src 127.0.0.0/8
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Whitelist domains -- base set (always allowed)
acl allowed_domains dstdomain api.telegram.org
acl allowed_domains dstdomain api.openai.com
acl allowed_domains dstdomain chatgpt.com
acl allowed_domains dstdomain auth0.openai.com
acl allowed_domains dstdomain api.anthropic.com
acl allowed_domains dstdomain api.search.brave.com
acl allowed_domains dstdomain openclaw.ai
acl allowed_domains dstdomain raw.githubusercontent.com
acl allowed_domains dstdomain registry.npmjs.org
acl allowed_domains dstdomain open.bigmodel.cn
acl allowed_domains dstdomain api.moonshot.cn

# Additional whitelist domains from codeshield-config (channels, LLM providers)
# File managed by: codeshield-config proxy-allow / add-channel / add-model
acl allowed_domains dstdomain "/etc/openclaw-codeshield/proxy-whitelist.conf"

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only whitelisted domains
http_access allow localnet allowed_domains
http_access deny all

# Request body size limit (64KB) -- prevents large data exfiltration
request_body_max_size 65536 bytes

# Delay pools -- rate limiting
delay_pools 1
delay_class 1 1
# 256KB/s aggregate, 64KB burst
delay_parameters 1 262144/65536
delay_access 1 allow localnet

# URL rewrite program -- injection detection
url_rewrite_program /usr/local/sbin/squid-injection-guard.py
url_rewrite_children 2 startup=1 idle=1 concurrency=0

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Security headers
via off
forwarded_for delete
reply_header_access X-Forwarded-For deny all
reply_header_access Server deny all

# Cache (minimal)
cache_mem 32 MB
maximum_object_size 4 MB
cache_dir ufs /var/spool/squid 100 16 256

# DNS
dns_nameservers 127.0.0.53

# Timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds

# Shutdown
shutdown_lifetime 5 seconds
