# CODE SHIELD V3.0.8 -- Squid Outbound Proxy Configuration
# Controlled proxy for OpenClaw AI Agent
#
# Security model:
#   - iptables forces ALL outbound traffic from openclaw-svc through this proxy
#     (direct external connections are blocked at the kernel level)
#   - All traffic is LOGGED here for forensic audit
#   - Rate limiting prevents bulk data exfiltration
#   - Request body size limit caps upload payload
#   - Injection guard scans URLs for prompt injection patterns
#   - Domain whitelist below is REFERENCE ONLY (enforcement removed so web_fetch
#     and AI agent tools can access arbitrary URLs on behalf of the user)
#
# To re-enable strict domain enforcement (disables web_fetch), change:
#   http_access allow localnet
# back to:
#   http_access allow localnet allowed_domains

# Basic settings
http_port 3128
visible_hostname codeshield-proxy

# Access control
acl localnet src 127.0.0.0/8
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Known LLM API and service domains (reference / for future selective enforcement)
acl known_api_domains dstdomain api.telegram.org
acl known_api_domains dstdomain api.openai.com
acl known_api_domains dstdomain chatgpt.com
acl known_api_domains dstdomain auth0.openai.com
acl known_api_domains dstdomain api.anthropic.com
acl known_api_domains dstdomain api.search.brave.com
acl known_api_domains dstdomain api.deepseek.com
acl known_api_domains dstdomain openclaw.ai
acl known_api_domains dstdomain raw.githubusercontent.com
acl known_api_domains dstdomain github.com
acl known_api_domains dstdomain registry.npmjs.org
acl known_api_domains dstdomain open.bigmodel.cn
acl known_api_domains dstdomain api.moonshot.cn
# Additional domains from codeshield-config proxy-allow / add-channel / add-model
acl known_api_domains dstdomain "/etc/openclaw-codeshield/proxy-whitelist.conf"

# Deny non-safe ports (still enforced)
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow all traffic from localnet through the proxy.
# Security is enforced by: iptables (forces proxy use) + rate limiting + logging + body size limit.
http_access allow localnet
http_access deny all

# Request body size limit (10MB) -- LLM API calls need more than 64KB for conversation history.
# Still limits bulk data upload exfiltration.
request_body_max_size 10485760 bytes

# Delay pools -- rate limiting (1MB/s aggregate, 256KB burst)
# Limits exfiltration throughput even if domain restriction is removed.
delay_pools 1
delay_class 1 1
delay_parameters 1 1048576/262144
delay_access 1 allow localnet

# URL rewrite program -- injection detection
url_rewrite_program /usr/local/sbin/squid-injection-guard.py
url_rewrite_children 2 startup=1 idle=1 concurrency=0

# Logging (all traffic logged for security audit)
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Security headers (strip identifying info)
via off
forwarded_for delete
reply_header_access X-Forwarded-For deny all
reply_header_access Server deny all

# Cache (minimal)
cache_mem 32 MB
maximum_object_size 4 MB
cache_dir ufs /var/spool/squid 100 16 256

# DNS
dns_nameservers 127.0.0.53

# Timeouts -- extended for LLM API calls (reasoning models can take 3-5 minutes)
connect_timeout 30 seconds
read_timeout 300 seconds
request_timeout 300 seconds

# Shutdown
shutdown_lifetime 5 seconds
